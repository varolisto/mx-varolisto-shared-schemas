name: CI

on:
  push:
    branches: [main, sandbox, 'changeset-release/**']
  pull_request:
    branches: [main, sandbox]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Check de tipos
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build dual ESM + CJS + types
        run: pnpm build
