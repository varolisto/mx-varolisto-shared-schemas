# ============================================================
# WORKFLOW DEPRECADO — Reemplazado por release.yml + Changesets
# ============================================================
# Este workflow se conserva por trazabilidad. Su trigger fue
# cambiado a workflow_dispatch para evitar ejecuciones
# accidentales. NO publica via push de tag.
#
# Para releases nuevos: usar `pnpm changeset` (ver README).
# ============================================================

name: Release (Manual - DEPRECATED)

on:
  workflow_dispatch:
    # Workflow deprecado tras adopcion de Changesets (Sprint 1, abr 2026).
    # Conservado solo por trazabilidad historica. NO USAR salvo emergencia.
    # Si necesitas un release de emergencia, contacta al CEO antes.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@varolisto"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
